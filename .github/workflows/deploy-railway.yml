name: Deploy Server to Railway

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/server/**'
      - 'packages/server-schema/**'
      - 'packages/soul-engine/**'
      - 'openclaw/**'
      - '.github/workflows/deploy-railway.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ai-companion-server

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/production/railway/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Make GHCR package public
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Make the container package public so Railway free tier can pull it
          curl -s -X PATCH \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/user/packages/container/${{ env.IMAGE_NAME }}/versions" || true

          # Set package visibility to public
          curl -s -X PATCH \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/user/packages/container/${{ env.IMAGE_NAME }}" \
            -d '{"visibility":"public"}' || true

      - name: Trigger Railway redeploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Triggering Railway redeploy..."
          RESULT=$(curl -s -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -X POST https://backboard.railway.app/graphql/v2 \
            -d '{"query":"mutation { serviceInstanceRedeploy(environmentId: \"8a41ded9-9fad-4708-b11d-c2bdd3775e1a\", serviceId: \"14afd7c4-1599-434a-bc24-788e00841c2a\") }"}')
          echo "Railway response: $RESULT"
